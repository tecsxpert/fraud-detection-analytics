version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend

  backend:
    image: springboot-analytics-api:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://db:5432/analytics
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=analytics
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
